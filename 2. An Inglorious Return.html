<h1>An Inglorious Return</h1>
<p>Kúkọ́rọ̀ọ̀ kò!</p>
<p>What in Olódùmarè’s name—?</p>
<p>Your eyes fly open, dread rising, but fall away when you realise a mere cockerel woke you. You blink at the straw beneath you, confused for a heartbeat before memory settles.</p>
